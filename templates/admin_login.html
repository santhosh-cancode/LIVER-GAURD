{% extends "base.html" %}

{% block content %}
<div class="container animate-fade-in">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="glass-card p-4 p-md-5 border-top border-4 border-dark">
                <div class="text-center mb-4">
                    <div class="mb-3 text-dark">
                        <i class="fa-solid fa-user-shield fa-3x"></i>
                    </div>
                    <h2 class="fw-bold">Admin Portal</h2>
                    <p class="text-muted small">System Access Restricted</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Admin Username" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-dark w-100 mb-3">Login to Dashboard</button>

                    <div class="text-center">
                        <a href="{{ url_for('home') }}" class="text-decoration-none text-muted small"><i
                                class="fa fa-arrow-left me-1"></i> Back to Home</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
