{% extends "base.html" %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="glass-card p-4 p-md-5 animate-fade-in">
        <div class="text-center mb-4">
          <h2 class="fw-bold">Create Account</h2>
          <p class="text-muted small">Start your health journey today</p>
        </div>

        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control" placeholder="John Doe" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0"><i class="fa fa-phone text-muted"></i></span>
              <input type="tel" name="phone" class="form-control border-start-0 ps-0" placeholder="1234567890" required>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn btn-theme w-100 mb-3">Register Now</button>

          <div class="text-center">
            <small class="text-muted">Already have an account? <a href="{{ url_for('login') }}"
                class="fw-bold text-decoration-none">Login</a></small>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
