{% extends "base.html" %}

{% block content %}
<div class="container animate-fade-in">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="glass-card p-4 p-md-5">
        <div class="text-center mb-4">
          <h2 class="fw-bold">Add New Doctor</h2>
          <p class="text-muted small">Create credentials for medical staff</p>
        </div>

        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Doctor ID</label>
            <input type="text" name="doctor_id" class="form-control" placeholder="DOC-001" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control" placeholder="Dr. Jane Smith" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="tel" name="phone" class="form-control" placeholder="Contact Number" required>
          </div>
          <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn btn-theme w-100 mb-3">Create Account</button>

          <div class="text-center">
            <a href="{{ url_for('admin_dashboard') }}" class="text-decoration-none text-muted small">
              <i class="fa fa-arrow-left me-1"></i> Cancel & Return
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
