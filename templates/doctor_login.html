{% extends "base.html" %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="glass-card p-4 p-md-5 animate-fade-in border-top border-4 border-primary">
        <div class="text-center mb-4">
          <div class="mb-3 text-primary">
            <i class="fa-solid fa-user-doctor fa-3x"></i>
          </div>
          <h2 class="fw-bold">Doctor Portal</h2>
          <p class="text-muted small">Secure access for medical professionals</p>
        </div>

        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Doctor ID</label>
            <input type="text" name="doctor_id" class="form-control" placeholder="DOC-ID" required>
          </div>
          <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn btn-theme w-100 mb-3">Login to Dashboard</button>

          <div class="text-center">
            <a href="{{ url_for('home') }}" class="text-decoration-none text-muted small"><i
                class="fa fa-arrow-left me-1"></i> Back to Home</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
