{% extends "base.html" %}

{% block content %}
<div class="container pb-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="glass-card p-4 p-md-5 animate-fade-in">
        <div class="text-center mb-5">
          <h2 class="fw-bold mb-2">Liver Disease Prediction</h2>
          <p class="text-muted">Enter the clinical parameters below for an automated assessment.</p>
        </div>

        <form method="POST">
          <!-- Section 1: Demographics -->
          <h5 class="fw-bold text-primary mb-3"><i class="fa-solid fa-user me-2"></i>Patient Demographics</h5>
          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label class="form-label">Age</label>
              <input type="number" name="Age" class="form-control" placeholder="Years" min="1" max="120" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Gender</label>
              <select name="Gender" class="form-select" required>
                <option value="" selected disabled>Select...</option>
                <option value="1">Male</option>
                <option value="0">Female</option>
              </select>
            </div>
          </div>

          <hr class="border-light my-4">

          <!-- Section 2: Clinical Data -->
          <h5 class="fw-bold text-primary mb-3"><i class="fa-solid fa-flask me-2"></i>Clinical Parameters</h5>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label" title="Range: 0.1 - 1.2 mg/dL">Total Bilirubin</label>
              <input type="number" name="Total_Bilirubin" class="form-control" step="0.1" placeholder="0.1 - 1.2 mg/dL"
                required>
            </div>
            <div class="col-md-6">
              <label class="form-label" title="Range: 44 - 147 IU/L">Alkaline Phosphotase</label>
              <input type="number" name="Alkaline_Phosphotase" class="form-control" placeholder="44 - 147 IU/L"
                required>
            </div>

            <div class="col-md-6">
              <label class="form-label" title="ALT (SGPT) Range: 7 - 55 IU/L">Alamine Aminotransferase (ALT)</label>
              <input type="number" name="Alamine_Aminotransferase" class="form-control" placeholder="7 - 55 IU/L"
                required>
            </div>
            <div class="col-md-6">
              <label class="form-label" title="AST (SGOT) Range: 8 - 48 IU/L">Aspartate Aminotransferase (AST)</label>
              <input type="number" name="Aspartate_Aminotransferase" class="form-control" placeholder="8 - 48 IU/L"
                required>
            </div>

            <div class="col-md-6">
              <label class="form-label" title="Range: 6.0 - 8.3 g/dL">Total Proteins</label>
              <input type="number" name="Total_Protiens" class="form-control" step="0.1" placeholder="6.0 - 8.3 g/dL"
                required>
            </div>
            <div class="col-md-6">
              <label class="form-label" title="Range: 3.4 - 5.4 g/dL">Albumin</label>
              <input type="number" name="Albumin" class="form-control" step="0.1" placeholder="3.4 - 5.4 g/dL" required>
            </div>
            <div class="col-md-12">
              <label class="form-label" title="Range: 0.8 - 2.0">Albumin to Globulin Ratio</label>
              <input type="number" name="Albumin_and_Globulin_Ratio" class="form-control" step="0.01"
                placeholder="0.8 - 2.0" required>
            </div>
          </div>

          <div class="mt-5 text-center">
            <button type="submit" class="btn btn-theme px-5 py-3 rounded-pill shadow-lg">
              <i class="fa-solid fa-wand-magic-sparkles me-2"></i> Analyze Data
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
